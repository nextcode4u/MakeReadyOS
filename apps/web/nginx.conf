map $http_x_forwarded_host $makereadyos_forwarded_host {
  default $http_x_forwarded_host;
  "" $http_host;
}

map $http_x_forwarded_proto $makereadyos_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 0;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /manifest.webmanifest {
    default_type application/manifest+json;
    try_files /manifest.webmanifest =404;
  }

  location /api/ {
    proxy_pass http://api:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $makereadyos_forwarded_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $makereadyos_forwarded_host;
    proxy_set_header X-Forwarded-Proto $makereadyos_forwarded_proto;
  }
}
